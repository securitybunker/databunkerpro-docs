openapi: 3.0.3
info:
  title: Databunker API
  description: |
    Databunker is a super-fast, open-source vault built with Go for secure storage of sensitive personal records.

    ## Authentication
    All API requests require authentication using the `X-Bunker-Token` header. This token is your root access token.

    ## Content Types
    The API supports the following content types for POST and PUT requests:
    - `application/json`
    - `application/x-www-form-urlencoded`

    ## User Tokens
    Keep the user `{token}` generated by Databunker private, as it serves as an additional user identifier.
    Under GDPR, this user token is referred to as a pseudonymized identity.

    For more details, visit: https://databunker.org/
  version: 1.0.0
  contact:
    name: Databunker Support
    url: https://databunker.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: User
    description: User personal information management
  - name: User App
    description: Additional user application data
  - name: Session
    description: Secure session storage
  - name: Consent
    description: User consent management
  - name: Agreement
    description: Agreement management
  - name: Request
    description: User privacy requests (GDPR)
  - name: Audit
    description: Audit log access
  - name: Expiration
    description: Data expiration and retention
  - name: System
    description: System administration

security:
  - ApiKeyAuth: []

paths:
  /v1/user:
    post:
      tags:
        - User
      summary: Create a new user record
      description: |
        Creates a new encrypted user record. Databunker extracts `login`, `phone`, and `email` from the request
        and builds hashed indexes for lookup. These values must be unique across all users.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
            examples:
              basic:
                summary: Basic user creation
                value:
                  firstName: John
                  lastName: Doe
                  email: user@example.com
                  login: john
              withPhone:
                summary: User with phone number
                value:
                  first: John
                  last: Doe
                  email: user@example.com
                  login: john
                  phone: "+1-415-555-0123"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "200":
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      token:
                        type: string
                        format: uuid
                        description: Unique user token (pseudonymized identity)
              examples:
                success:
                  value:
                    status: ok
                    token: db80789b-0ad7-0690-035a-fd2c42531e87
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/user/token/{token}:
    get:
      tags:
        - User
      summary: Get user by token
      description: Retrieves a user record by their unique token
      operationId: getUserByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
      responses:
        "200":
          description: User record retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      token:
                        type: string
                        format: uuid
                      data:
                        type: object
                        additionalProperties: true
                        description: Decrypted user data
              examples:
                success:
                  value:
                    status: ok
                    token: DAD2474A-E9A7-4BA7-BFC2-C4506880198E
                    data:
                      fname: paranoid
                      lname: guy
                      login: user1123
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags:
        - User
      summary: Update user by token
      description: |
        Updates a user record. When using JSON, you can remove fields by setting their value to null.
        All changes are logged in the audit trail.
      operationId: updateUserByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              updateName:
                summary: Update user name
                value:
                  name: Alex
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      token:
                        type: string
                        format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - User
      summary: Delete user by token
      description: |
        Removes all user records from the database, keeping only the user token for reference.
        This fulfills the GDPR "right to be forgotten" requirement.
        In the enterprise version, deletion can be delayed according to company policy.
      operationId: deleteUserByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      result:
                        type: string
                        example: done
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

