  /v1/userapp/token/{token}/{appname}:
    post:
      tags:
        - User App
      summary: Create or update user app record by token
      description: |
        Stores additional information about a user for a specific application.
        This is useful for storing app-specific data (e.g., shipping info) separately from profile data.
        Submitting multiple times overwrites the previous value.
      operationId: createUserAppByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
        - $ref: "#/components/parameters/AppName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              shipping:
                summary: Shipping information
                value:
                  country: UK
                  address: "123 Main St"
                  city: London
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: User app record created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
