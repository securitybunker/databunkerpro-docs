                      expiration_date:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sys/backup:
    get:
      tags:
        - System
      summary: Backup database
      description: |
        Dumps the internal database in SQL format (SQLite only).
        Requires root token authentication.
      operationId: backupDatabase
      responses:
        "200":
          description: Database backup
          content:
            application/sql:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Bunker-Token
      description: Root access token for Databunker API

  parameters:
    UserToken:
      name: token
      in: path
      required: true
      description: User token (UUID)
      schema:
        type: string
        format: uuid
      example: db80789b-0ad7-0690-035a-fd2c42531e87

    Email:
      name: email
      in: path
      required: true
      description: User email address
      schema:
        type: string
        format: email
      example: user@example.com

    Phone:
      name: phone
      in: path
      required: true
      description: User phone number
      schema:
        type: string
      example: "+1-415-555-0123"

    Login:
      name: login
      in: path
      required: true
      description: User login name
      schema:
        type: string
      example: john

    AppName:
      name: appname
      in: path
      required: true
      description: Application name for user app data
      schema:
        type: string
        pattern: "^[a-z0-9-]+$"
      example: shipping

    ConsentBrief:
      name: brief
      in: path
      required: true
      description: Consent brief (unique identifier, max 64 chars)
      schema:
        type: string
        pattern: "^[a-z0-9-]+$"
        maxLength: 64
      example: send-sms

  schemas:
    UserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email (unique, creates search index)
        phone:
          type: string
          description: User phone number (unique, creates search index)
        login:
          type: string
          description: User login name (unique, creates search index)
        firstName:
          type: string
          description: User first name
        first:
          type: string
          description: Alternative field for first name
        lastName:
          type: string
          description: User last name
        last:
          type: string
          description: Alternative field for last name
      additionalProperties: true
      description: |
        User data can contain any additional fields. The email, phone, and login fields
        are extracted and indexed for lookup. At least one indexed field is recommended.

    SessionCreate:
      type: object
      properties:
        expiration:
          type: string
          description: Session TTL (e.g., '3d', '2h', '30m')
          example: 3d
        clientip:
          type: string
          description: Client IP address
        x-forwarded-for:
          type: string
          description: X-Forwarded-For header value
      additionalProperties: true

    Session:
      type: object
      properties:
        session:
          type: string
          format: uuid
        when:
          type: integer
          format: int64
          description: Unix timestamp
        data:
          type: object
          additionalProperties: true

    ConsentCreate:
      type: object
      properties:
        status:
          type: string
          enum: [accept, cancel]
          default: accept
          description: Consent status
        message:
          type: string
          description: Text message describing consent
        who:
          type: string
          description: Free text for internal usage
        starttime:
          type: string
          description: Date & time to automatically enable consent (Unix time or duration like '10d')
        endtime:
          type: string
          description: Consent expiration date (Unix time or duration like '1m')
        lawfulbasis:
          type: string
          enum: [consent, contract-agreement, legal-obligations]
          default: consent
          description: Legal basis for processing
        module:
          type: string
          default: api
          description: Module type (e.g., phone-consent, contract, app-consent, web-consent, email-consent)
        referencecode:
          type: string
          description: Internal document or contract ID
        lastmodifiedby:
          type: string
          description: Name of person who last modified this record

    Consent:
      type: object
      properties:
        brief:
          type: string
        status:
          type: string
          enum: [accept, cancel, expired]
        message:
          type: string
        who:
          type: string
        starttime:
          type: integer
          format: int64
        endtime:
          type: integer
          format: int64
        lawfulbasis:
          type: string
        module:
          type: string
        referencecode:
          type: string
        lastmodifiedby:
          type: string
        created:
          type: integer
          format: int64
        updated:
          type: integer
          format: int64

    SuccessResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    SuccessTokenResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            token:
              type: string
              format: uuid

    ErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [error]
          example: error
        message:
          type: string
          description: Error description

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            duplicate:
              summary: Duplicate user
              value:
                status: error
                message: user with this email already exists

    Unauthorized:
      description: Unauthorized - invalid or missing token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              summary: Missing token
              value:
                status: error
                message: missing X-Bunker-Token header

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found - resource doesn't exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              summary: User not found
              value:
                status: error
                message: user not found

    Conflict:
      description: Conflict - resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  requestBodies:
    UserUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
          examples:
            update:
              summary: Update user fields
              value:
                name: Alex
                city: London
        application/x-www-form-urlencoded:
          schema:
            type: object
            additionalProperties: true
