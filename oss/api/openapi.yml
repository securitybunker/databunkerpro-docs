        - User App
      summary: Get user app record by token
      description: Retrieves app-specific data for a user
      operationId: getUserAppByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
        - $ref: "#/components/parameters/AppName"
      responses:
