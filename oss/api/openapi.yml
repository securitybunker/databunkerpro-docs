  /v1/session/token/{token}:
    post:
      tags:
        - Session
      summary: Create session by user token
      description: |
        Creates a new user session and returns a session token.
        Sessions can have an expiration TTL specified in the request.
      operationId: createSessionByToken
      parameters:
        - $ref: "#/components/parameters/UserToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
            examples:
              basic:
                summary: Basic session
                value:
                  expiration: 3d
                  clientip: 1.1.1.1
                  x-forwarded-for: 2.2.2.2
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "200":
          description: Session created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
