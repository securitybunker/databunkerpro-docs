    post:
      tags:
        - Expiration
      summary: Cancel user expiration
      description: Cancels user account expiration. Requires admin or user token.
      operationId: cancelExpiration
      parameters:
        - $ref: "#/components/parameters/UserToken"
      responses:
        "200":
          description: Expiration cancelled
          content:
