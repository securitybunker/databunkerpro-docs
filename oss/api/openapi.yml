        - Expiration
      summary: Start user expiration flow
      description: |
        Triggers the user expiration flow for data minimization compliance.
        Returns an expiration token that can be used to create retention/deletion links.
      operationId: startExpiration
      parameters:
        - $ref: "#/components/parameters/UserToken"
      responses:
        "200":
          description: Expiration flow started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      exptoken:
                        type: string
                        description: Expiration token for browser links
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/exp/retain/{exptoken}:
    get:
      tags:
        - Expiration
      summary: Retain user data
      description: |
        Cancels expiration and retains user data. This link works in the browser without authentication.
      operationId: retainUserData
      parameters:
        - name: exptoken
          in: path
          required: true
          description: Expiration token
          schema:
            type: string
      responses:
        "200":
          description: Data retention confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

